name: sdd-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun --version
      - run: bun test plugins/sdd-pack/extensions/sdd-extension/index.test.ts plugins/sdd-pack/src/cli/__tests__/api.test.ts
      - run: bun run plugins/sdd-pack/src/cli/api-runner.ts validate
      - run: bun run plugins/sdd-pack/src/cli/api-runner.ts status
